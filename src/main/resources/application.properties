# Quarkus Configuration
quarkus.application.name=phone-store-server
quarkus.http.port=8080

# Database Configuration
quarkus.datasource.db-kind=mysql
quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/PhoneShopDB
quarkus.datasource.username=phone_root
quarkus.datasource.password=12345678
quarkus.datasource.jdbc.driver=com.mysql.cj.jdbc.Driver

# Connection Pool
quarkus.datasource.jdbc.max-size=20
quarkus.datasource.jdbc.min-size=5

# Hibernate ORM Configuration
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.log.bind-parameters=false
quarkus.hibernate-orm.bytecode.enhancement.enabled=false

# Transaction Configuration
quarkus.hibernate-orm.transaction.type=jta

# Logging
quarkus.log.level=INFO
quarkus.log.category."org.hibernate.SQL".level=DEBUG
quarkus.log.category."org.hibernate.type.descriptor.sql.BasicBinder".level=DEBUG

# CORS Configuration
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=*
quarkus.http.cors.access-control-allow-credentials=true

# Development Mode
%dev.quarkus.log.level=DEBUG
