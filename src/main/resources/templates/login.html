{#include layout}
{#title}Đăng nhập - Phone Store{/title}

{#head}
<style>
  .auth-container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 60px 20px;
  }

  .auth-card {
    background: white;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    width: 100%;
    max-width: 400px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
  }

  .form-group input {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
  }

  .btn-submit {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
  }
</style>
{/head}

{#body}
<div class="auth-container">
  <div class="auth-card">
    <h2 style="text-align: center; margin-bottom: 25px;">Đăng nhập</h2>
    <form action="/api/users/login" method="POST">
      <div class="form-group">
        <label>Email hoặc Số điện thoại</label>
        <input type="text" name="username" required>
      </div>
      <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn-submit">Đăng nhập</button>
    </form>
  </div>
</div>
{/body}
{/include}
