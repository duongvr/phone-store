{#include admin/admin-layout pageTitle="Quản lý Đơn hàng" activeMenu="orders"}
{#title}Quản lý Đơn hàng - Admin{/title}

{#body}
<div class="admin-card">
  <div style="display: flex; gap: 20px; margin-bottom: 25px; align-items: center; justify-content: space-between;">
    <div style="display: flex; align-items: center; gap: 12px; background: white; padding: 5px 15px; border: 1px solid #e2e8f0; border-radius: 10px;">
        <lord-icon src="https://cdn.lordicon.com/piurhpdv.json" trigger="hover" colors="primary:#64748b" style="width:20px;height:20px"></lord-icon>
        <select id="statusFilter" style="padding: 8px; border: none; outline: none; font-size: 14px; color: #475569; background: transparent;">
            <option value="">Tất cả trạng thái</option>
            <option value="PENDING">Chờ xác nhận</option>
            <option value="CONFIRMED">Đã xác nhận</option>
            <option value="SHIPPING">Đang giao</option>
            <option value="DELIVERED">Đã giao</option>
            <option value="CANCELLED">Đã hủy</option>
        </select>
    </div>
    <button class="btn btn-primary" onclick="loadAdminOrders()" style="display: flex; align-items: center; gap: 8px;">
        <lord-icon src="https://cdn.lordicon.com/rsitunbt.json" trigger="hover" colors="primary:#ffffff" style="width:18px;height:18px"></lord-icon>
        Làm mới dữ liệu
    </button>
  </div>

  <div style="overflow-x: auto;">
    <table>
      <thead>
        <tr>
          <th style="width: 100px;">Mã ĐH</th>
          <th>Khách hàng</th>
          <th>Ngày đặt</th>
          <th>Tổng tiền</th>
          <th>Trạng thái</th>
          <th style="text-align: center;">Hành động</th>
        </tr>
      </thead>
      <tbody id="ordersBody">
        <tr>
          <td colspan="6" style="text-align: center; padding: 60px; color: #94a3b8;">
              <div style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
                  <lord-icon src="https://cdn.lordicon.com/vosfvrme.json" trigger="loop" colors="primary:#94a3b8" style="width:40px;height:40px"></lord-icon>
                  Đang tải dữ liệu...
              </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    loadAdminOrders();
    document.getElementById('statusFilter').addEventListener('change', filterOrders);
  });

  let allOrders = [];

  async function loadAdminOrders() {
    try {
      const res = await fetch(API + "/orders", { headers: getAuthHeader() });
      if (res.ok) {
        allOrders = await res.json();
        filterOrders();
      } else {
        document.getElementById("ordersBody").innerHTML = '<tr><td colspan="6" style="text-align:center; color:#ef4444; padding: 40px;">Lỗi tải dữ liệu đơn hàng</td></tr>';
      }
    } catch (e) { console.error(e); }
  }

  function filterOrders() {
    const status = document.getElementById('statusFilter').value;
    const filtered = status ? allOrders.filter(o => o.status === status) : allOrders;
    renderOrders(filtered);
  }

  function renderOrders(orders) {
    const body = document.getElementById("ordersBody");
    if (!orders || orders.length === 0) {
      body.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 40px; color: #94a3b8;">Không có đơn hàng nào khớp với bộ lọc</td></tr>';
      return;
    }

    let html = '';
    orders.sort((a,b) => b.id - a.id).forEach(o => {
      const date = o.createdAt ? new Date(o.createdAt).toLocaleString('vi-VN') : '---';
      const statusStyle = getStatusStyle(o.status);

      let actionsHtml = `
        <a href="/admin/orders/$\{o.id}" class="btn" title="Chi tiết" style="padding: 8px; border-radius: 8px; background: #eff6ff; border: 1px solid #dbeafe;">
          <lord-icon src="https://cdn.lordicon.com/tyvtvbcy.json" trigger="hover" colors="primary:#3b82f6" style="width:20px;height:20px"></lord-icon>
        </a>`;
      
      if (o.status === 'PENDING') {
        actionsHtml += ` 
          <button class="btn" title="Xác nhận đơn" onclick="updateStatus($\{o.id}, 'CONFIRMED')" style="padding: 8px; border-radius: 8px; background: #ecfdf5; border: 1px solid #d1fae5;">
            <lord-icon src="https://cdn.lordicon.com/oqdmuxru.json" trigger="hover" colors="primary:#10b981" style="width:20px;height:20px"></lord-icon>
          </button>`;
      } else if (o.status === 'CONFIRMED') {
        actionsHtml += ` 
          <button class="btn" title="Giao hàng" onclick="updateStatus($\{o.id}, 'SHIPPING')" style="padding: 8px; border-radius: 8px; background: #fefce8; border: 1px solid #fef08a;">
            <lord-icon src="https://cdn.lordicon.com/msetysmi.json" trigger="hover" colors="primary:#eab308" style="width:20px;height:20px"></lord-icon>
          </button>`;
      }

      html += `
        <tr>
          <td style="font-weight: 700; color: #6366f1;">#$\{o.id}</td>
          <td>
            <div style="font-weight: 600; color: #1e293b;">$\{o.customerName || 'N/A'}</div>
            <div style="font-size: 12px; color: #64748b;">$\{o.customerPhone || ''}</div>
          </td>
          <td style="color: #64748b; font-size: 14px;">$\{date}</td>
          <td style="font-weight: 700; color: #1e293b;">$\{formatPrice(o.totalAmount)}</td>
          <td>
            <span style="background: $\{statusStyle.bg}; color: $\{statusStyle.color}; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 4px;">
              $\{statusStyle.label}
            </span>
          </td>
          <td>
            <div style="display: flex; justify-content: center; gap: 8px;">
                $\{actionsHtml}
            </div>
          </td>
        </tr>`;
    });
    body.innerHTML = html;
  }

  async function updateStatus(id, status) {
    if (!confirm('Bạn có chắc muốn cập nhật trạng thái đơn hàng này?')) return;
    try {
      const res = await fetch(API + "/orders/" + id + "/status?status=" + status, {
        method: "PATCH",
        headers: getAuthHeader()
      });
      if (res.ok) {
        showToast("Đã cập nhật trạng thái đơn hàng", "success");
        loadAdminOrders();
      } else { 
        const data = await res.json();
        showToast(data.message || "Cập nhật thất bại", "error"); 
      }
    } catch (e) { showToast("Lỗi kết nối", "error"); }
  }
</script>
{/body}
{/include}
