{#include admin/admin-layout pageTitle="Quản lý Người dùng" activeMenu="users"}
{#title}Quản lý Người dùng - Admin{/title}

{#body}
<div class="admin-card">
    <div style="display: flex; justify-content: space-between; margin-bottom: 25px; align-items: center;">
        <div style="position: relative; display: flex; align-items: center;">
            <lord-icon src="https://cdn.lordicon.com/vgxjrbxm.json" trigger="hover" colors="primary:#94a3b8" style="width:20px;height:20px;position:absolute;left:12px;"></lord-icon>
            <input type="text" id="userSearch" placeholder="Tìm kiếm người dùng (email, sđt)..." style="padding: 12px 12px 12px 40px; width: 350px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 14px; outline: none;" oninput="filterUsers()">
        </div>
        <button class="btn btn-primary" onclick="loadUsers()" style="display: flex; align-items: center; gap: 8px;">
            <lord-icon src="https://cdn.lordicon.com/rsitunbt.json" trigger="hover" colors="primary:#ffffff" style="width:18px;height:18px"></lord-icon>
            Làm mới
        </button>
    </div>

    <div style="overflow-x: auto;">
        <table>
            <thead>
            <tr>
                <th style="width: 80px;">ID</th>
                <th>Họ tên</th>
                <th>Email / SĐT</th>
                <th style="width: 150px;">Phân quyền</th>
                <th style="width: 150px;">Trạng thái</th>
                <th style="width: 150px; text-align: center;">Hành động</th>
            </tr>
            </thead>
            <tbody id="usersBody">
            <tr>
                <td colspan="6" style="text-align: center; padding: 60px; color: #94a3b8;">
                    <div style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
                        <lord-icon src="https://cdn.lordicon.com/vosfvrme.json" trigger="loop" colors="primary:#94a3b8" style="width:40px;height:40px"></lord-icon>
                        Đang tải dữ liệu...
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let allUsers = [];

    document.addEventListener("DOMContentLoaded", function() {
        loadUsers();
    });

    async function loadUsers() {
        try {
            const res = await fetch(API + "/users", { headers: getAuthHeader() });
            if (res.ok) {
                allUsers = await res.json();
                renderUsers(allUsers);
            } else {
                document.getElementById("usersBody").innerHTML = '<tr><td colspan="6" style="text-align:center; color:#ef4444; padding: 40px;">Lỗi tải dữ liệu người dùng</td></tr>';
            }
        } catch (e) {
            console.error("Error:", e);
        }
    }

    function renderUsers(users) {
        const body = document.getElementById("usersBody");
        if (!users || users.length === 0) {
            body.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 40px; color: #94a3b8;">Không tìm thấy người dùng nào</td></tr>';
            return;
        }

        let html = '';
        users.sort((a,b) => b.id - a.id).forEach(u => {
            const is_admin = (u.role === 'ADMIN' || u.role === 'admin');
            const roleStyle = is_admin ? 'background: #fef2f2; color: #dc2626; border: 1px solid #fee2e2;' : 'background: #eff6ff; color: #2563eb; border: 1px solid #dbeafe;';
            const roleLabel = is_admin ? 'Quản trị viên' : 'Khách hàng';
            
            const isActive = u.active !== false;
            const statusStyle = isActive ? 'background: #ecfdf5; color: #059669; border: 1px solid #d1fae5;' : 'background: #fef2f2; color: #dc2626; border: 1px solid #fee2e2;';
            const statusLabel = isActive ? 'Hoạt động' : 'Bị khóa';
            
            const actionBtnTitle = isActive ? 'Khóa tài khoản' : 'Mở khóa tài khoản';
            const actionBtnIcon = isActive ? 'https://cdn.lordicon.com/skkahier.json' : 'https://cdn.lordicon.com/bxxnzvfm.json';
            const actionBtnColor = isActive ? 'primary:#ef4444' : 'primary:#10b981';
            
            html += `
                <tr>
                    <td style="color: #64748b;">#$\{u.id}</td>
                    <td>
                        <div style="font-weight: 600; color: #1e293b;">$\{u.fullName || 'Người dùng'}</div>
                    </td>
                    <td>
                        <div style="color: #1e293b;">$\{u.email}</div>
                        <div style="font-size:12px; color:#64748b;">$\{u.phone || 'Chưa cập nhật SĐT'}</div>
                    </td>
                    <td>
                        <span style="$\{roleStyle} padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;">$\{roleLabel}</span>
                    </td>
                    <td>
                        <span style="$\{statusStyle} padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;">$\{statusLabel}</span>
                    </td>
                    <td>
                        <div style="display: flex; justify-content: center; gap: 8px;">
                            <button class="btn" title="$\{actionBtnTitle}" onclick="toggleLock($\{u.id}, $\{isActive})" style="padding: 8px; border-radius: 8px; background: $\{isActive ? '#fef2f2' : '#ecfdf5'}; border: 1px solid $\{isActive ? '#fee2e2' : '#d1fae5'};">
                                <lord-icon src="$\{actionBtnIcon}" trigger="hover" colors="$\{actionBtnColor}" style="width:20px;height:20px"></lord-icon>
                            </button>
                        </div>
                    </td>
                </tr>
            `;
        });
        body.innerHTML = html;
    }

    function filterUsers() {
        const q = document.getElementById("userSearch").value.toLowerCase();
        const filtered = allUsers.filter(u => 
            (u.fullName && u.fullName.toLowerCase().includes(q)) || 
            (u.email && u.email.toLowerCase().includes(q)) || 
            (u.phone && u.phone.includes(q))
        );
        renderUsers(filtered);
    }

    async function toggleLock(id, isActive) {
        const actionText = isActive ? "khóa" : "mở khóa";
        if (!confirm(`Bạn có chắc muốn $\{actionText} tài khoản này?`)) return;
        
        try {
            const endpoint = isActive ? `/api/users/$\{id}/deactivate` : `/api/users/$\{id}/activate`;
            const res = await fetch(endpoint, {
                method: "POST",
                headers: getAuthHeader()
            });
            
            if (res.ok) {
                showToast(`Đã $\{actionText} tài khoản thành công!`, "success");
                loadUsers();
            } else {
                const data = await res.json();
                showToast(data.message || `Lỗi khi $\{actionText} tài khoản`, "error");
            }
        } catch (e) {
            console.error(e);
            showToast(`Lỗi khi $\{actionText} tài khoản`, "error");
        }
    }
</script>

{/body}
{/include}
