{#include admin/admin-layout pageTitle="Cập nhật Sản phẩm" activeMenu="products"}
{#title}Cập nhật Sản phẩm - Admin{/title}

{#body}
<div class="admin-card" style="max-width: 900px; margin: 0 auto;">
    <form id="productForm">
        <h3 id="formTitle" style="margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px;">Thông tin sản phẩm</h3>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px;">
            <div>
                <label style="display: block; font-weight: 600; margin-bottom: 5px;">Tên sản phẩm *</label>
                <input type="text" id="name" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div>
                <label style="display: block; font-weight: 600; margin-bottom: 5px;">Danh mục *</label>
                <select id="categoryId" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
                    <option value="">Chọn danh mục</option>
                </select>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 25px;">
            <div>
                <label style="display: block; font-weight: 600; margin-bottom: 5px;">Giá bán (₫) *</label>
                <input type="number" id="price" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div>
                <label style="display: block; font-weight: 600; margin-bottom: 5px;">Giá gốc (₫)</label>
                <input type="number" id="originalPrice" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div>
                <label style="display: block; font-weight: 600; margin-bottom: 5px;">Số lượng kho *</label>
                <input type="number" id="stock" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
        </div>

        <h3 style="margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px;">Hình ảnh & Mô tả</h3>
        <div style="margin-bottom: 15px;">
            <label style="display: block; font-weight: 600; margin-bottom: 5px;">URL Hình ảnh đại diện *</label>
            <input type="text" id="imageUrl" required placeholder="https://..." style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
        </div>
        <div style="margin-bottom: 25px;">
            <label style="display: block; font-weight: 600; margin-bottom: 5px;">Mô tả sản phẩm</label>
            <textarea id="description" rows="5" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; resize: vertical;"></textarea>
        </div>

        <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 30px;">
            <a href="/admin/products" class="btn" style="background: #f1f2f6; color: #333;">Hủy bỏ</a>
            <button type="submit" class="btn btn-primary">💾 Lưu Sản phẩm</button>
        </div>
    </form>
</div>

<script>
    let isEdit = false;
    let productId = null;

    document.addEventListener("DOMContentLoaded", async function() {
        await loadCategories();
        
        const path = window.location.pathname;
        if (path.includes('/edit/')) {
            isEdit = true;
            productId = path.split('/').pop();
            document.getElementById("formTitle").textContent = "Cập nhật Sản phẩm #" + productId;
            loadProductData(productId);
        } else {
            document.getElementById("formTitle").textContent = "Thêm Sản phẩm mới";
        }

        document.getElementById("productForm").onsubmit = handleSave;
    });

    async function loadCategories() {
        try {
            const res = await fetch(API + "/categories");
            if (res.ok) {
                const cats = await res.json();
                const select = document.getElementById("categoryId");
                cats.forEach(c => {
                    select.innerHTML += `<option value="$\{c.id}">$\{c.name}</option>`;
                });
            }
        } catch (e) { console.error(e); }
    }

    async function loadProductData(id) {
        try {
            const res = await fetch(API + "/products/" + id);
            if (res.ok) {
                const p = await res.json();
                document.getElementById("name").value = p.name;
                document.getElementById("categoryId").value = p.categoryId;
                document.getElementById("price").value = p.price;
                document.getElementById("originalPrice").value = p.originalPrice || '';
                document.getElementById("stock").value = p.stock;
                document.getElementById("imageUrl").value = p.imageUrl;
                document.getElementById("description").value = p.description || '';
            }
        } catch (e) { console.error(e); }
    }

    async function handleSave(e) {
        e.preventDefault();
        const data = {
            name: document.getElementById("name").value,
            categoryId: parseInt(document.getElementById("categoryId").value),
            price: parseFloat(document.getElementById("price").value),
            originalPrice: parseFloat(document.getElementById("originalPrice").value) || null,
            stock: parseInt(document.getElementById("stock").value),
            imageUrl: document.getElementById("imageUrl").value,
            description: document.getElementById("description").value
        };

        try {
            const url = isEdit ? API + "/products/" + productId : API + "/products";
            const method = isEdit ? "PUT" : "POST";
            
            const res = await fetch(url, {
                method: method,
                headers: getAuthHeader(),
                body: JSON.stringify(data)
            });

            if (res.ok) {
                showToast("Đã lưu sản phẩm thành công", "success");
                setTimeout(() => window.location.href = "/admin/products", 1000);
            } else {
                showToast("Lưu thất bại. Vui lòng kiểm tra lại dữ liệu.", "error");
            }
        } catch (e) {
            showToast("Lỗi kết nối", "error");
        }
    }
</script>
{/body}
{/include}
