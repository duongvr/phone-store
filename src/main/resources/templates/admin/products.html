{#include admin/admin-layout pageTitle="Quản lý Sản phẩm" activeMenu="products"}
{#title}Quản lý Sản phẩm - Admin{/title}

{#body}
<div class="admin-card">
  <div style="display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center;">
    <input type="text" id="productSearch" placeholder="Tìm kiếm sản phẩm..." style="padding: 10px; width: 300px; border: 1px solid #ddd; border-radius: 4px;" oninput="filterProducts()">
    <a href="/admin/products/add" class="btn btn-primary">+ Thêm Sản phẩm mới</a>
  </div>

  <table id="productsTable">
    <thead>
    <tr>
      <th>ID</th>
      <th>Hình ảnh</th>
      <th>Tên sản phẩm</th>
      <th>Giá bán</th>
      <th>Tồn kho</th>
      <th>Hành động</th>
    </tr>
    </thead>
    <tbody id="productsBody">
    <tr>
      <td colspan="6" style="text-align: center; padding: 20px;">Đang tải dữ liệu...</td>
    </tr>
    </tbody>
  </table>
</div>

<script>
  let allProducts = [];

  document.addEventListener("DOMContentLoaded", function() {
    loadAdminProducts();
  });

  async function loadAdminProducts() {
    try {
      const res = await fetch(API + "/products?pageSize=1000", { headers: getAuthHeader() });
      if (res.ok) {
        allProducts = await res.json();
        renderProducts(allProducts);
      } else {
        document.getElementById("productsBody").innerHTML = '<tr><td colspan="6" style="text-align:center; color:red;">Lỗi tải dữ liệu</td></tr>';
      }
    } catch (e) {
      console.error("Error:", e);
    }
  }

  function renderProducts(products) {
    const body = document.getElementById("productsBody");
    if (!products || products.length === 0) {
      body.innerHTML = '<tr><td colspan="6" style="text-align:center;">Không có sản phẩm nào</td></tr>';
      return;
    }

    let html = '';
    products.forEach(p => {
      html += `
        <tr>
          <td>#$\{p.id}</td>
          <td><img src="$\{p.imageUrl || '/images/placeholder.png'}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 4px;" onerror="this.src='/images/placeholder.png'"></td>
          <td style="font-weight: 600;">$\{p.name}</td>
          <td>$\{formatPrice(p.price)}</td>
          <td><span style="color: $\{p.stock > 5 ? '#27ae60' : '#e74c3c'}; font-weight: bold;">$\{p.stock}</span></td>
          <td>
            <a href="/admin/products/edit/$\{p.id}" class="btn btn-primary" style="font-size: 12px;">Sửa</a>
            <button class="btn btn-danger" style="font-size: 12px;" onclick="deleteProduct($\{p.id})">Xóa</button>
          </td>
        </tr>
      `;
    });
    body.innerHTML = html;
  }

  function filterProducts() {
    const q = document.getElementById("productSearch").value.toLowerCase();
    const filtered = allProducts.filter(p => p.name.toLowerCase().includes(q));
    renderProducts(filtered);
  }

  async function deleteProduct(id) {
    if (!confirm("Bạn có chắc chắn muốn xóa sản phẩm này?")) return;
    try {
      const res = await fetch(API + "/products/" + id, {
        method: "DELETE",
        headers: getAuthHeader()
      });
      if (res.ok) {
        showToast("Đã xóa sản phẩm", "success");
        loadAdminProducts();
      } else {
        showToast("Xóa thất bại", "error");
      }
    } catch (e) {
      showToast("Lỗi kết nối", "error");
    }
  }
</script>
{/body}
{/include}
