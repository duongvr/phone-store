{#include admin/admin-layout pageTitle="Quản lý Sản phẩm" activeMenu="products"}
{#title}Quản lý Sản phẩm - Admin{/title}

{#body}
<div class="admin-card">
  <div style="display: flex; justify-content: space-between; margin-bottom: 25px; align-items: center;">
    <div style="position: relative; display: flex; align-items: center;">
      <lord-icon src="https://cdn.lordicon.com/vgxjrbxm.json" trigger="hover" colors="primary:#94a3b8" style="width:20px;height:20px;position:absolute;left:12px;"></lord-icon>
      <input type="text" id="productSearch" placeholder="Tìm kiếm sản phẩm..." style="padding: 12px 12px 12px 40px; width: 350px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 14px; outline: none; transition: border-color 0.2s;" oninput="filterProducts()">
    </div>
    <a href="/admin/products/add" class="btn btn-primary" style="display: flex; align-items: center; gap: 10px; padding: 12px 24px;">
      <lord-icon src="https://cdn.lordicon.com/mrdxhwqb.json" trigger="hover" colors="primary:#ffffff" style="width:20px;height:20px"></lord-icon>
      Thêm Sản phẩm mới
    </a>
  </div>

  <div style="overflow-x: auto;">
    <table id="productsTable">
      <thead>
      <tr>
        <th style="width: 80px;">ID</th>
        <th style="width: 100px;">Hình ảnh</th>
        <th>Tên sản phẩm</th>
        <th style="width: 150px;">Giá bán</th>
        <th style="width: 120px;">Tồn kho</th>
        <th style="width: 150px; text-align: center;">Hành động</th>
      </tr>
      </thead>
      <tbody id="productsBody">
      <tr>
        <td colspan="6" style="text-align: center; padding: 60px; color: #94a3b8;">
            <div style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
                <lord-icon src="https://cdn.lordicon.com/vosfvrme.json" trigger="loop" colors="primary:#94a3b8" style="width:40px;height:40px"></lord-icon>
                Đang tải dữ liệu...
            </div>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  let allProducts = [];

  document.addEventListener("DOMContentLoaded", function() {
    loadAdminProducts();
  });

  async function loadAdminProducts() {
    try {
      const res = await fetch(API + "/products?pageSize=1000", { headers: getAuthHeader() });
      if (res.ok) {
        allProducts = await res.json();
        renderProducts(allProducts);
      } else {
        document.getElementById("productsBody").innerHTML = '<tr><td colspan="6" style="text-align:center; color:#ef4444; padding: 40px;">Lỗi tải dữ liệu từ máy chủ</td></tr>';
      }
    } catch (e) { console.error(e); }
  }

  function renderProducts(products) {
    const body = document.getElementById("productsBody");
    if (!products || products.length === 0) {
      body.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 40px; color: #94a3b8;">Không có sản phẩm nào khớp với tìm kiếm</td></tr>';
      return;
    }

    let html = '';
    products.forEach(p => {
      html += `
        <tr>
          <td style="color: #64748b; font-weight: 500;">#$\{p.id}</td>
          <td>
            <div style="width: 50px; height: 50px; border-radius: 8px; overflow: hidden; background: #f8fafc; border: 1px solid #f1f5f9;">
                <img src="$\{p.imageUrl || '/images/placeholder.png'}" style="width: 100%; height: 100%; object-fit: cover;" onerror="this.src='/images/placeholder.png'">
            </div>
          </td>
          <td>
            <div style="font-weight: 600; color: #1e293b;">$\{p.name}</div>
            <div style="font-size: 12px; color: #64748b;">$\{p.categoryName || 'Chưa phân loại'}</div>
          </td>
          <td style="font-weight: 700; color: #1e293b;">$\{formatPrice(p.price)}</td>
          <td>
            <span style="background: $\{p.stock > 10 ? '#ecfdf5' : '#fef2f2'}; color: $\{p.stock > 10 ? '#059669' : '#dc2626'}; padding: 4px 10px; border-radius: 6px; font-size: 13px; font-weight: 700;">
                $\{p.stock}
            </span>
          </td>
          <td>
            <div style="display: flex; justify-content: center; gap: 8px;">
                <a href="/admin/products/edit/$\{p.id}" class="btn btn-primary" title="Sửa" style="padding: 8px; border-radius: 8px; background: #eff6ff; border: 1px solid #dbeafe;">
                  <lord-icon src="https://cdn.lordicon.com/pkvuljtg.json" trigger="hover" colors="primary:#3b82f6" style="width:20px;height:20px"></lord-icon>
                </a>
                <button class="btn btn-danger" title="Xóa" onclick="deleteProduct($\{p.id})" style="padding: 8px; border-radius: 8px; background: #fef2f2; border: 1px solid #fee2e2;">
                  <lord-icon src="https://cdn.lordicon.com/skkahier.json" trigger="hover" colors="primary:#ef4444" style="width:20px;height:20px"></lord-icon>
                </button>
            </div>
          </td>
        </tr>`;
    });
    body.innerHTML = html;
  }

  function filterProducts() {
    const q = document.getElementById("productSearch").value.toLowerCase();
    const filtered = allProducts.filter(p => p.name.toLowerCase().includes(q) || (p.categoryName && p.categoryName.toLowerCase().includes(q)));
    renderProducts(filtered);
  }

  async function deleteProduct(id) {
    if (!confirm("Bạn có chắc chắn muốn xóa sản phẩm này?")) return;
    try {
      const res = await fetch(API + "/products/" + id, {
        method: "DELETE",
        headers: getAuthHeader()
      });
      if (res.ok) {
        showToast("Đã xóa sản phẩm thành công", "success");
        loadAdminProducts();
      } else { 
        const data = await res.json();
        showToast(data.message || "Xóa thất bại", "error"); 
      }
    } catch (e) { showToast("Lỗi kết nối", "error"); }
  }
</script>

{/body}
{/include}
