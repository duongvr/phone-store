{#include layout}
{#title}Sổ địa chỉ - Phone Store{/title}

{#head}
<style>
    .address-container {
        max-width: 900px;
        margin: 40px auto;
        padding: 0 15px;
    }

    .address-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
    }

    .address-header h2 {
        font-size: 28px;
        font-weight: 700;
        color: #1e293b;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .btn-add-address {
        padding: 12px 24px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border: none;
        border-radius: 12px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: all 0.3s;
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .btn-add-address:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(102, 126, 234, 0.4);
    }

    .address-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 20px;
    }

    .address-card {
        background: white;
        border-radius: 20px;
        padding: 25px;
        border: 1px solid #e2e8f0;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        transition: all 0.3s;
        position: relative;
        overflow: hidden;
    }

    .address-card:hover {
        border-color: #667eea;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    .address-card.default {
        border: 2px solid #667eea;
        background: rgba(102, 126, 234, 0.02);
    }

    .address-info {
        display: flex;
        flex-direction: column;
        gap: 10px;
        flex: 1;
    }

    .address-label {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #667eea;
        margin-bottom: -5px;
    }

    .address-name {
        font-size: 18px;
        font-weight: 700;
        color: #1e293b;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .badge-default {
        background: #e0e7ff;
        color: #4338ca;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
    }

    .address-detail {
        color: #64748b;
        font-size: 15px;
        line-height: 1.6;
    }

    .address-phone {
        color: #1e293b;
        font-weight: 600;
        font-size: 15px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .address-actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .btn-action {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        border: 1px solid #e2e8f0;
        background: white;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .btn-action:hover {
        background: #f8fafc;
        border-color: #cbd5e1;
        transform: scale(1.05);
    }

    .btn-delete:hover {
        background: #fef2f2;
        border-color: #fecaca;
        color: #ef4444;
    }

    /* Modal Styles */
    .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(15, 23, 42, 0.6);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 2000;
        backdrop-filter: blur(8px);
        padding: 20px;
    }

    .modal.show {
        display: flex;
    }

    .modal-content {
        background: white;
        border-radius: 24px;
        width: 100%;
        max-width: 600px;
        padding: 35px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        animation: modalFadeIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes modalFadeIn {
        from { transform: scale(0.9) translateY(20px); opacity: 0; }
        to { transform: scale(1) translateY(0); opacity: 1; }
    }

    .modal-header {
        margin-bottom: 25px;
        border-bottom: 1px solid #f1f5f9;
        padding-bottom: 15px;
    }

    .modal-header h3 {
        font-size: 24px;
        font-weight: 800;
        color: #0f172a;
    }

    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }

    .form-group.full {
        grid-column: span 2;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #475569;
        font-size: 14px;
    }

    .form-group input, .form-group select {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 15px;
        transition: all 0.3s;
        background: #f8fafc;
    }

    .form-group input:focus, .form-group select:focus {
        outline: none;
        border-color: #667eea;
        background: white;
        box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .checkbox-group {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        padding: 10px 0;
    }

    .checkbox-group input {
        width: 20px;
        height: 20px;
        cursor: pointer;
    }

    .modal-footer {
        display: flex;
        justify-content: flex-end;
        gap: 15px;
        margin-top: 30px;
    }

    .btn-cancel {
        padding: 12px 25px;
        background: #f1f5f9;
        color: #475569;
        border: none;
        border-radius: 12px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-cancel:hover {
        background: #e2e8f0;
    }

    .empty-state {
        text-align: center;
        padding: 80px 40px;
        background: white;
        border-radius: 24px;
        border: 2px dashed #e2e8f0;
    }
</style>
{/head}

{#body}
<div class="page-title">
  <h2>📍 Sổ địa chỉ của tôi</h2>
  <p>Quản lý các địa điểm nhận hàng của bạn</p>
</div>

<div class="address-container">
    <div class="address-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <lord-icon src="https://cdn.lordicon.com/surcxhbe.json" trigger="loop" delay="2000" colors="primary:#667eea" style="width:48px;height:48px"></lord-icon>
            <h3 style="font-size: 22px; font-weight: 700;">Danh sách địa chỉ</h3>
        </div>
        <button class="btn-add-address" onclick="openModal()">
            <lord-icon src="https://cdn.lordicon.com/mrdxhwqb.json" trigger="hover" colors="primary:#ffffff" style="width:20px;height:20px"></lord-icon>
            Thêm địa chỉ mới
        </button>
    </div>

    <div id="addressList" class="address-grid">
        <div class="empty-state">
            <lord-icon src="https://cdn.lordicon.com/vosfvrme.json" trigger="loop" colors="primary:#94a3b8" style="width:80px;height:80px;margin-bottom:20px"></lord-icon>
            <p style="color: #64748b; font-weight: 600; font-size: 18px;">Đang tải danh sách địa chỉ...</p>
        </div>
    </div>
</div>

<!-- Add/Edit Address Modal -->
<div id="addressModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Thêm địa chỉ mới</h3>
        </div>
        <form id="addressForm" onsubmit="handleSubmit(event)">
            <input type="hidden" id="addressId">
            <div class="form-grid">
                <div class="form-group">
                    <label for="name">Tên nhãn (Ví dụ: Nhà riêng, Công ty)</label>
                    <input type="text" id="name" required placeholder="Nhà riêng">
                </div>
                <div class="form-group">
                    <label for="fullName">Họ và tên người nhận</label>
                    <input type="text" id="fullName" required placeholder="Nguyễn Văn A">
                </div>
                <div class="form-group">
                    <label for="phone">Số điện thoại</label>
                    <input type="text" id="phone" required placeholder="09xxxxxxxx">
                </div>
                <div class="form-group">
                    <label for="city">Tỉnh / Thành phố</label>
                    <input type="text" id="city" required placeholder="Hà Nội">
                </div>
                <div class="form-group">
                    <label for="district">Quận / Huyện</label>
                    <input type="text" id="district" required placeholder="Cầu Giấy">
                </div>
                <div class="form-group">
                    <label for="ward">Phường / Xã</label>
                    <input type="text" id="ward" required placeholder="Dịch Vọng Hậu">
                </div>
                <div class="form-group full">
                    <label for="address">Địa chỉ cụ thể (Số nhà, tên đường)</label>
                    <input type="text" id="address" required placeholder="Số 123, đường Xuân Thủy">
                </div>
                <div class="form-group full">
                    <label class="checkbox-group">
                        <input type="checkbox" id="isDefault">
                        <span>Đặt làm địa chỉ mặc định</span>
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-cancel" onclick="closeModal()">Hủy</button>
                <button type="submit" class="btn-add-address" id="submitBtn">Lưu địa chỉ</button>
            </div>
        </form>
    </div>
</div>

<script>
    let addresses = [];

    document.addEventListener("DOMContentLoaded", function() {
        if (!requireAuth("/addresses")) return;
        loadAddresses();
    });

    async function loadAddresses() {
        let userId = localStorage.getItem("user_id");
        if (!userId) {
            let attempts = 0;
            while (!userId && attempts < 30) {
                await new Promise(resolve => setTimeout(resolve, 100));
                userId = localStorage.getItem("user_id");
                attempts++;
            }
        }
        if (!userId) return;

        try {
            const res = await fetch(API + "/addresses/user/" + userId, {
                headers: getAuthHeader()
            });
            if (res.ok) {
                addresses = await res.json();
                renderAddresses();
            } else {
                showToast("Không thể tải danh sách địa chỉ", "error");
            }
        } catch (e) {
            console.error(e);
            showToast("Lỗi kết nối", "error");
        }
    }

    function renderAddresses() {
        const list = document.getElementById("addressList");
        if (addresses.length === 0) {
            list.innerHTML = `
                <div class="empty-state">
                    <lord-icon src="https://cdn.lordicon.com/mrdxhwqb.json" trigger="loop" colors="primary:#94a3b8" style="width:80px;height:80px;margin-bottom:20px"></lord-icon>
                    <p style="color: #64748b; font-weight: 600; font-size: 18px;">Bạn chưa có địa chỉ nào.</p>
                    <button class="btn-add-address" style="margin-top:20px; display:inline-flex;" onclick="openModal()">+ Thêm ngay</button>
                </div>
            `;
            return;
        }

        // Sắp xếp mặc định lên đầu
        addresses.sort((a, b) => b.isDefault - a.isDefault);

        list.innerHTML = addresses.map(addr => `
            <div class="address-card $\{ addr.isDefault ? 'default' : ''}">
                <div class="address-info">
                    <div class="address-label">$\{ addr.name || 'Địa chỉ'}</div>
                    <div class="address-name">
                        $\{ addr.fullName}
                        $\{ addr.isDefault ? '<span class="badge-default">Mặc định</span>' : ''}
                    </div>
                    <div class="address-phone">
                        <lord-icon src="https://cdn.lordicon.com/wtywrnoz.json" trigger="hover" colors="primary:#1e293b" style="width:18px;height:18px"></lord-icon>
                        $\{ addr.phone}
                    </div>
                    <div class="address-detail">
                        $\{ addr.address}<br>
                        $\{ addr.ward}, $\{ addr.district}, $\{ addr.city}
                    </div>
                </div>
                <div class="address-actions">
                    $\{ !addr.isDefault ? \`<button class="btn-action" onclick="setDefault($\{addr.id})" title="Đặt làm mặc định">📌</button>\` : ''}
                    <button class="btn-action" onclick="editAddress($\{ addr.id})" title="Chỉnh sửa">✏️</button>
                    <button class="btn-action btn-delete" onclick="deleteAddress($\{ addr.id})" title="Xóa">🗑️</button>
                </div>
            </div>
        `).join('');
    }

    function openModal() {
        document.getElementById("modalTitle").textContent = "Thêm địa chỉ mới";
        document.getElementById("addressForm").reset();
        document.getElementById("addressId").value = "";
        document.getElementById("addressModal").classList.add("show");
    }

    function closeModal() {
        document.getElementById("addressModal").classList.remove("show");
    }

    function editAddress(id) {
        const addr = addresses.find(a => a.id === id);
        if (!addr) return;

        document.getElementById("modalTitle").textContent = "Chỉnh sửa địa chỉ";
        document.getElementById("addressId").value = addr.id;
        document.getElementById("name").value = addr.name || "";
        document.getElementById("fullName").value = addr.fullName;
        document.getElementById("phone").value = addr.phone;
        document.getElementById("city").value = addr.city || "";
        document.getElementById("district").value = addr.district || "";
        document.getElementById("ward").value = addr.ward || "";
        document.getElementById("address").value = addr.address;
        document.getElementById("isDefault").checked = addr.isDefault;

        document.getElementById("addressModal").classList.add("show");
    }

    async function handleSubmit(event) {
        event.preventDefault();
        const userId = localStorage.getItem("user_id");
        const id = document.getElementById("addressId").value;
        const btn = document.getElementById("submitBtn");
        
        const data = {
            userId: parseInt(userId),
            name: document.getElementById("name").value,
            fullName: document.getElementById("fullName").value,
            phone: document.getElementById("phone").value,
            city: document.getElementById("city").value,
            district: document.getElementById("district").value,
            ward: document.getElementById("ward").value,
            address: document.getElementById("address").value,
            isDefault: document.getElementById("isDefault").checked
        };

        btn.disabled = true;
        btn.textContent = "Đang lưu...";

        const method = id ? "PUT" : "POST";
        const url = id ? API + "/addresses/" + id : API + "/addresses/user/" + userId;

        try {
            const res = await fetch(url, {
                method: method,
                headers: getAuthHeader(),
                body: JSON.stringify(data)
            });

            if (res.ok) {
                showToast(id ? "✅ Cập nhật thành công" : "✅ Đã thêm địa chỉ mới", "success");
                closeModal();
                loadAddresses();
            } else {
                const err = await res.json();
                showToast(err.message || "Có lỗi xảy ra", "error");
            }
        } catch (e) {
            showToast("Lỗi kết nối", "error");
        } finally {
            btn.disabled = false;
            btn.textContent = "Lưu địa chỉ";
        }
    }

    async function deleteAddress(id) {
        if (!confirm("Bạn có chắc chắn muốn xóa địa chỉ này?")) return;

        try {
            const res = await fetch(API + "/addresses/" + id, {
                method: "DELETE",
                headers: getAuthHeader()
            });

            if (res.ok) {
                showToast("🗑️ Đã xóa địa chỉ", "success");
                loadAddresses();
            } else {
                showToast("Không thể xóa địa chỉ", "error");
            }
        } catch (e) {
            showToast("Lỗi kết nối", "error");
        }
    }

    async function setDefault(id) {
        const userId = localStorage.getItem("user_id");
        try {
            const res = await fetch(API + "/addresses/" + id + "/set-default", {
                method: "POST",
                headers: getAuthHeader(),
                body: JSON.stringify({ userId: parseInt(userId) })
            });

            if (res.ok) {
                showToast("📌 Đã đặt làm mặc định", "success");
                loadAddresses();
            } else {
                showToast("Thao tác thất bại", "error");
            }
        } catch (e) {
            showToast("Lỗi kết nối", "error");
        }
    }
</script>
{/body}
{/include}
